<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日更｜闹市见静寺</title>
    <style type="text/css" media="all">
      body {
        margin: 0;
        font-family: "Helvetica Neue", Helvetica, Arial, "Hiragino Sans GB", sans-serif;
        font-size: 14px;
        line-height: 20px;
        color: #777;
        background-color: white;
      }
      .container {
        width: 700px;
        margin-right: auto;
        margin-left: auto;
      }

      .post {
        font-family: Georgia, "Times New Roman", Times, "SimSun", serif;
        position: relative;
        padding: 70px;
        bottom: 0;
        overflow-y: auto;
        font-size: 16px;
        font-weight: normal;
        line-height: 25px;
        color: #515151;
      }

      .post h1{
        font-size: 50px;
        font-weight: 500;
        line-height: 60px;
        margin-bottom: 40px;
        color: inherit;
      }

      .post p {
        margin: 0 0 35px 0;
      }

      .post img {
        border: 1px solid #D9D9D9;
      }

      .post a {
        color: #28A1C5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="post">
        <h1 class="title">日更｜闹市见静寺</h1>
        <div class="show-content">
          <p>今日乘坐顺风车去上海领取护照，是的，签证已经下来了。途经闹市，突然在林立的高楼大厦中见到一座古朴的寺庙，静安寺。土黄色的外墙带着沉甸甸的岁月一同扎根此地，历经近两千年的时光，安然坐卧，静看韶华。行至此地，仿佛乘舟随激流湍急而下，忽至静潭临百丈深渊，闹中取静，触动非常。</p>
        </div>
      </div>
    </div>
  </body>
</html>
