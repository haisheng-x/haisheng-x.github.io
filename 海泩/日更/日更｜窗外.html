<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日更｜窗外</title>
    <style type="text/css" media="all">
      body {
        margin: 0;
        font-family: "Helvetica Neue", Helvetica, Arial, "Hiragino Sans GB", sans-serif;
        font-size: 14px;
        line-height: 20px;
        color: #777;
        background-color: white;
      }
      .container {
        width: 700px;
        margin-right: auto;
        margin-left: auto;
      }

      .post {
        font-family: Georgia, "Times New Roman", Times, "SimSun", serif;
        position: relative;
        padding: 70px;
        bottom: 0;
        overflow-y: auto;
        font-size: 16px;
        font-weight: normal;
        line-height: 25px;
        color: #515151;
      }

      .post h1{
        font-size: 50px;
        font-weight: 500;
        line-height: 60px;
        margin-bottom: 40px;
        color: inherit;
      }

      .post p {
        margin: 0 0 35px 0;
      }

      .post img {
        border: 1px solid #D9D9D9;
      }

      .post a {
        color: #28A1C5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="post">
        <h1 class="title">日更｜窗外</h1>
        <div class="show-content">
          <p>这是一个平凡的周末</p><p>和以往每一个周末一样</p><p>一排树影在风中摇曳</p><p>诉说着昨夜的梦</p><p>与九天之上的星辰</p><p>奔跑跳跃的孩童</p><p>追逐打闹的小狗</p><p>还有巧笑嫣然的她</p><p>都落在窗内的一双眼中</p><p>伸长柔软的四肢</p><p>雪白的肚皮晒起了太阳</p><p>宝石般的双眼中的细线</p><p>是昨夜的银河</p>
        </div>
      </div>
    </div>
  </body>
</html>
