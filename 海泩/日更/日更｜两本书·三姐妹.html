        <h1 class="title">日更｜两本书·三姐妹</h1>
        <div class="show-content">
          <p>周六和大姐二姐相聚，拿到了寄到大姐家的两本书。一本是《鸭绿江》，发文赠送的刊物。一本是永冬泩去年为征文全勤奖作者准备的礼物，比我想象中的厚重。</p><p>我与大姐二姐相识已经近二十年，自初中在蹲坑时结拜之后，这份情谊竟然维持到了今天。如今，我们的孩子玩在一起也跟亲兄弟姐妹一样。每次回来，见得最多的就是她俩，去了她两家里，跟自己家一样。我笑称，我在长沙有个家，在宁乡县城有个家，在乡下还有一个家。如今，我们一起开始谋划以后一起养老了。到时候租个乡下别墅（能自建更好），比邻而居，美哉美哉。</p><p><br></p><div class="image-package">
