<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日更｜大学</title>
    <style type="text/css" media="all">
      body {
        margin: 0;
        font-family: "Helvetica Neue", Helvetica, Arial, "Hiragino Sans GB", sans-serif;
        font-size: 14px;
        line-height: 20px;
        color: #777;
        background-color: white;
      }
      .container {
        width: 700px;
        margin-right: auto;
        margin-left: auto;
      }

      .post {
        font-family: Georgia, "Times New Roman", Times, "SimSun", serif;
        position: relative;
        padding: 70px;
        bottom: 0;
        overflow-y: auto;
        font-size: 16px;
        font-weight: normal;
        line-height: 25px;
        color: #515151;
      }

      .post h1{
        font-size: 50px;
        font-weight: 500;
        line-height: 60px;
        margin-bottom: 40px;
        color: inherit;
      }

      .post p {
        margin: 0 0 35px 0;
      }

      .post img {
        border: 1px solid #D9D9D9;
      }

      .post a {
        color: #28A1C5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="post">
        <h1 class="title">日更｜大学</h1>
        <div class="show-content">
          <p>这几天回路城，见系主任，交接工作。闲暇之余推着小麦在学校里散步，晒晒太阳。学院南边这一块，以前没有来过，原来是一个接一个的运动场馆。美国的综合性大学，都格外重视运动。每个学校都会给出许多运动奖学金名额，各种运动的都有，这些“特长生”在大学期间需要参与校队训练和比赛，同时可以和其他学生一样择专业学习。高等教育机构对运动的支持其实反映的也是这个国家的态度，此外，我想也和运动的商业化息息相关。</p>
        </div>
      </div>
    </div>
  </body>
</html>
